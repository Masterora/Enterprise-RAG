Worker:
  ParseConcurrency: 4
  ChunkConcurrency: 4
  EmbeddingConcurrency: 2
  DeleteConcurrency: 1

Chunking:
  Size: 800
  Overlap: 120
  MinSize: 120
  BoundaryLookback: 160

Retrieval:
  TopK: 5
  CandidateMultiplier: 5
  CandidateLimit: 50
  SimilarityThreshold: 0.35
  RelativeScoreThreshold: 0.72
  MaxCitations: 5
  MaxChunksPerDocument: 3
  QueryRewrite: true
  Rerank: true
  RewriteTimeoutSeconds: 6
  MaxQueryRunes: 500
  MaxSubQueries: 4

Reliability:
  LLMTimeoutSeconds: 45
  MaxRetries: 2
  RetryBackoffMillis: 300

Evaluation:
  CasesFile: evaluation-cases.yaml
  MinRecallAtK: 0.8
  MaxLatencyMS: 10000

Auth:
  AccessSecret: enterprise-rag-dev-secret
  ExpireHours: 72

LLM:
  Provider: openrouter
  Model: openai/gpt-5.6-sol
  ApiKey: ${OPENROUTER_API_KEY}
  BaseURL: https://openrouter.ai/api/v1

Embedding:
  Provider: openrouter
  Model: openai/text-embedding-3-small
  Dimension: 1536
  ApiKey: ${OPENROUTER_API_KEY}
  BaseURL: https://openrouter.ai/api/v1

Prompt:
  AnswerTemplate: ""
  ExplanationTemplate: ""
  WebSearchTemplate: ""
  OverviewPolishTemplate: ""
  QueryRewriteTemplate: ""
  RouteTemplate: ""

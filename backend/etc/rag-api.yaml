Name: rag-api
Host: 0.0.0.0
Port: 9999
Timeout: 120000

Postgres:
  DataSource: postgres://rag:rag@localhost:55432/rag?sslmode=disable

Redis:
  Host: localhost:6379
  Pass: ""
  Type: node

NATS:
  Url: nats://localhost:4222

MinIO:
  Endpoint: localhost:9000
  AccessKey: minioadmin
  SecretKey: minioadmin
  Bucket: rag-documents
  UseSSL: false

Milvus:
  Address: localhost:19530
  Collection: document_vectors
  Dimension: 1536
  MetricType: COSINE
  IndexType: HNSW
  TopK: 10
  MinScore: 0.65

Worker:
  ParseConcurrency: 4
  ChunkConcurrency: 4
  EmbeddingConcurrency: 2
  DeleteConcurrency: 1

Retrieval:
  QueryRewrite: true
  Rerank: true
  CandidateMultiplier: 5
  RewriteTimeoutSeconds: 6

Auth:
  AccessSecret: enterprise-rag-dev-secret
  ExpireHours: 72

LLM:
  Provider: openrouter
  Model: openai/gpt-5.6-sol
  ApiKey: ${OPENROUTER_API_KEY}
  BaseURL: https://openrouter.ai/api/v1

Embedding:
  Provider: openrouter
  Model: openai/text-embedding-3-small
  Dimension: 1536
  ApiKey: ${OPENROUTER_API_KEY}
  BaseURL: https://openrouter.ai/api/v1

Prompt:
  AnswerTemplate: ""
  WebSearchTemplate: ""
  OverviewPolishTemplate: ""
  QueryRewriteTemplate: ""

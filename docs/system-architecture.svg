<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="790" viewBox="0 0 1200 790" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise-RAG 系统架构</title>
  <desc id="desc">系统由用户访问层、文档入库链路、在线问答链路、共享数据层和外部模型服务组成。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="790" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1020"/><stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
      .layer { font: 700 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; fill: #8291A8; letter-spacing: 1px; }
      .title { font: 700 18px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; fill: #F8FAFC; }
      .name { font: 650 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; fill: #F1F5F9; }
      .body { font: 500 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; fill: #AFBDD0; }
      .tag { font: 600 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; fill: #DCE8F7; }
      .line { fill: none; stroke: #41516A; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .ingest { fill: none; stroke: #34D399; stroke-width: 2.5; stroke-linecap: round; }
      .query { fill: none; stroke: #38BDF8; stroke-width: 2.5; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1200" height="790" rx="24" fill="url(#bg)"/>

  <!-- User access -->
  <text x="54" y="42" class="layer">用户访问层</text>
  <g filter="url(#shadow)">
    <rect x="54" y="58" width="1092" height="88" rx="14" fill="#172033" stroke="#2D3A52"/>
    <text x="82" y="91" class="title">React + Vite 前端应用</text>
    <text x="82" y="116" class="body">知识助手 · 知识库管理 · 文档管理 · 运行日志 · 个人设置</text>
  </g>

  <!-- API gateway -->
  <path class="line" d="M600 146V174"/>
  <text x="54" y="166" class="layer">接口与业务层</text>
  <g filter="url(#shadow)">
    <rect x="54" y="174" width="1092" height="76" rx="12" fill="#1E293B" stroke="#35445E"/>
    <text x="82" y="205" class="title">Go-zero 后端服务</text>
    <text x="82" y="229" class="body">统一承载系统接口与业务编排</text>

    <rect x="418" y="190" width="210" height="44" rx="8" fill="#26334A"/>
    <text x="438" y="208" class="name">接口接入</text>
    <text x="438" y="226" class="body">POST API · SSE 流式响应</text>

    <rect x="646" y="190" width="216" height="44" rx="8" fill="#26334A"/>
    <text x="666" y="208" class="name">访问控制</text>
    <text x="666" y="226" class="body">身份鉴权 · 参数校验</text>

    <rect x="880" y="190" width="238" height="44" rx="8" fill="#26334A"/>
    <text x="900" y="208" class="name">运行治理</text>
    <text x="900" y="226" class="body">任务日志 · 状态追踪 · 检索评估</text>
  </g>

  <!-- Split -->
  <path class="ingest" d="M307 250V306"/>
  <path class="query" d="M893 250V306"/>

  <!-- Two bounded pipelines -->
  <text x="54" y="292" class="layer">核心业务链路</text>
  <g filter="url(#shadow)">
    <rect x="54" y="306" width="518" height="280" rx="14" fill="#121F25" stroke="#256C5B"/>
    <text x="82" y="339" class="title">文档入库链路</text>
    <text x="82" y="361" class="body">异步处理上传文档，并建立可检索索引</text>

    <rect x="82" y="390" width="134" height="72" rx="9" fill="#193B35"/>
    <text x="100" y="419" class="name">上传登记</text>
    <text x="100" y="442" class="body">文件与任务入库</text>
    <path class="ingest" d="M216 426H244"/>
    <rect x="244" y="390" width="134" height="72" rx="9" fill="#193B35"/>
    <text x="262" y="419" class="name">NATS 调度</text>
    <text x="262" y="442" class="body">任务流转与重试</text>
    <path class="ingest" d="M378 426H406"/>
    <rect x="406" y="390" width="138" height="72" rx="9" fill="#193B35"/>
    <text x="424" y="419" class="name">Worker</text>
    <text x="424" y="442" class="body">幂等消费与状态机</text>

    <path class="ingest" d="M475 462V490H149V506"/>
    <rect x="82" y="506" width="134" height="54" rx="9" fill="#21453E"/>
    <text x="100" y="529" class="name">结构化解析</text>
    <text x="100" y="547" class="body">正文 · 标题 · 页码</text>
    <path class="ingest" d="M216 533H244"/>
    <rect x="244" y="506" width="134" height="54" rx="9" fill="#21453E"/>
    <text x="262" y="529" class="name">内容切块</text>
    <text x="262" y="547" class="body">上下文与元数据</text>
    <path class="ingest" d="M378 533H406"/>
    <rect x="406" y="506" width="138" height="54" rx="9" fill="#21453E"/>
    <text x="424" y="529" class="name">向量化索引</text>
    <text x="424" y="547" class="body">Embedding · Upsert</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="628" y="306" width="518" height="280" rx="14" fill="#111D2A" stroke="#28678B"/>
    <text x="656" y="339" class="title">在线问答链路</text>
    <text x="656" y="361" class="body">围绕当前知识库检索、生成并返回有效引用</text>

    <rect x="656" y="390" width="134" height="72" rx="9" fill="#183650"/>
    <text x="674" y="419" class="name">问题路由</text>
    <text x="674" y="442" class="body">识别问答意图</text>
    <path class="query" d="M790 426H818"/>
    <rect x="818" y="390" width="134" height="72" rx="9" fill="#183650"/>
    <text x="836" y="419" class="name">检索增强</text>
    <text x="836" y="442" class="body">改写 · 混合召回</text>
    <path class="query" d="M952 426H980"/>
    <rect x="980" y="390" width="138" height="72" rx="9" fill="#183650"/>
    <text x="998" y="419" class="name">候选优化</text>
    <text x="998" y="442" class="body">重排 · 引用裁剪</text>

    <path class="query" d="M1049 462V490H723V506"/>
    <rect x="656" y="506" width="134" height="54" rx="9" fill="#20445F"/>
    <text x="674" y="529" class="name">Prompt 编排</text>
    <text x="674" y="547" class="body">问题 + 上下文</text>
    <path class="query" d="M790 533H818"/>
    <rect x="818" y="506" width="134" height="54" rx="9" fill="#20445F"/>
    <text x="836" y="529" class="name">模型生成</text>
    <text x="836" y="547" class="body">OpenRouter</text>
    <path class="query" d="M952 533H980"/>
    <rect x="980" y="506" width="138" height="54" rx="9" fill="#20445F"/>
    <text x="998" y="529" class="name">流式返回</text>
    <text x="998" y="547" class="body">答案 · 引用 · 状态</text>
  </g>

  <!-- Shared data -->
  <path class="line" d="M307 586V620H600"/>
  <path class="line" d="M893 586V620H600"/>
  <text x="54" y="630" class="layer">共享数据与外部服务</text>
  <g filter="url(#shadow)">
    <rect x="54" y="646" width="1092" height="98" rx="14" fill="#151D2D" stroke="#2D3A52"/>
    <rect x="76" y="667" width="188" height="56" rx="9" fill="#253148"/>
    <text x="94" y="691" class="name">PostgreSQL</text><text x="94" y="710" class="body">业务数据 · Chunk · 日志</text>
    <rect x="282" y="667" width="152" height="56" rx="9" fill="#253148"/>
    <text x="300" y="691" class="name">Milvus</text><text x="300" y="710" class="body">向量索引与检索</text>
    <rect x="452" y="667" width="152" height="56" rx="9" fill="#253148"/>
    <text x="470" y="691" class="name">MinIO</text><text x="470" y="710" class="body">原始文档存储</text>
    <rect x="622" y="667" width="180" height="56" rx="9" fill="#204238"/>
    <text x="640" y="691" class="name">NATS JetStream</text><text x="640" y="710" class="body">异步任务 · 失败重试</text>
    <rect x="820" y="667" width="304" height="56" rx="9" fill="#382A59"/>
    <text x="838" y="691" class="name">模型与网络服务</text><text x="838" y="710" class="body">对话模型 · Embedding · 外部网页搜索</text>
  </g>

  <g transform="translate(54 770)">
    <line x1="0" y1="0" x2="34" y2="0" class="ingest"/><text x="44" y="4" class="body">异步文档处理</text>
    <line x1="170" y1="0" x2="204" y2="0" class="query"/><text x="214" y="4" class="body">在线问答请求</text>
    <line x1="340" y1="0" x2="374" y2="0" class="line"/><text x="384" y="4" class="body">共享依赖</text>
  </g>
</svg>

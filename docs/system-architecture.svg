<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1726"/>
      <stop offset="1" stop-color="#161B2F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #F8FAFC; }
      .text { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #D8E3F2; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #AFC1D9; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="1056" height="92" rx="22" fill="#5B3A00"/>
    <text x="104" y="109" class="title">用户访问层</text>
    <text x="104" y="137" class="text">浏览器访问系统，完成登录、上传、检索和问答</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="188" width="1056" height="96" rx="22" fill="#163B63"/>
    <text x="104" y="225" class="title">管理界面</text>
    <text x="104" y="253" class="text">登录注册 ｜ 知识库管理 ｜ 文档管理 ｜ 问答页面 ｜ 个人设置</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="308" width="516" height="116" rx="22" fill="#173F2B"/>
    <text x="104" y="345" class="title">文档处理模块</text>
    <text x="104" y="373" class="text">文件上传 ｜ 文档解析 ｜ 内容切块 ｜ 向量化 ｜ 建立索引</text>
    <text x="104" y="399" class="small">负责把上传文档整理成可检索知识</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="612" y="308" width="516" height="116" rx="22" fill="#39205E"/>
    <text x="644" y="345" class="title">问答模块</text>
    <text x="644" y="373" class="text">问题输入 ｜ 资料检索 ｜ 答案生成 ｜ 引用返回</text>
    <text x="644" y="399" class="small">负责基于知识库内容生成答案并返回引用来源</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="448" width="246" height="108" rx="22" fill="#1E293B"/>
    <text x="104" y="485" class="title">用户数据</text>
    <text x="104" y="513" class="text">账号、登录信息</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="342" y="448" width="246" height="108" rx="22" fill="#1E293B"/>
    <text x="374" y="485" class="title">知识库数据</text>
    <text x="374" y="513" class="text">知识库、文档信息</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="612" y="448" width="246" height="108" rx="22" fill="#1E293B"/>
    <text x="644" y="485" class="title">文档索引</text>
    <text x="644" y="513" class="text">切块、向量、检索数据</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="882" y="448" width="246" height="108" rx="22" fill="#1E293B"/>
    <text x="914" y="485" class="title">文件存储</text>
    <text x="914" y="513" class="text">原始上传文件</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="580" width="1056" height="96" rx="22" fill="#5B1F1C"/>
    <text x="104" y="617" class="title">中间服务</text>
    <text x="104" y="645" class="text">PostgreSQL ｜ MinIO ｜ Milvus ｜ NATS ｜ Etcd</text>
  </g>
</svg>

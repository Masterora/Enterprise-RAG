<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="830" viewBox="0 0 1600 830" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise-RAG 系统架构</title>
  <desc id="desc">架构按体验层、服务层、知识与数据层、性能与工程保障层组织。浏览器只访问 Go-zero 业务与安全网关，FastAPI 与 LangGraph 通过受控工具协议完成 Agent 编排；在线检索与异步索引相互解耦，底层由数据存储、模型服务、流量治理、可靠恢复和全链路观测共同支撑。</desc>

  <defs>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow-blue" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto-start-reverse">
      <path d="M0 0L5 2.5L0 5Z" fill="#38BDF8"/>
    </marker>
    <marker id="arrow-green" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto-start-reverse">
      <path d="M0 0L5 2.5L0 5Z" fill="#34D399"/>
    </marker>
    <marker id="arrow-purple" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto-start-reverse">
      <path d="M0 0L5 2.5L0 5Z" fill="#A78BFA"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .layer { font-size: 13px; font-weight: 700; letter-spacing: 1.2px; fill: #A5B4C8; }
      .role { font-size: 20px; font-weight: 700; fill: #F8FAFC; }
      .tech { font-size: 12px; font-weight: 500; fill: #94A3B8; }
      .card-title { font-size: 14px; font-weight: 700; fill: #F1F5F9; }
      .body { font-size: 12px; font-weight: 400; fill: #C0CCDC; }
      .small { font-size: 11px; font-weight: 400; fill: #9EADC1; }
      .label { font-size: 11px; font-weight: 600; fill: #CFD8E6; }
      .blue-link { fill: none; stroke: #38BDF8; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
      .green-link { fill: none; stroke: #34D399; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-green); }
      .purple-link { fill: none; stroke: #A78BFA; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-purple); }
      .bidirectional-blue { marker-start: url(#arrow-blue); }
      .bidirectional-purple { marker-start: url(#arrow-purple); }
      .micro { stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1600" height="830" rx="24" fill="#0B1120"/>

  <!-- Experience layer -->
  <rect x="48" y="28" width="4" height="86" rx="2" fill="#38BDF8"/>
  <text x="70" y="56" class="layer">体验层</text>

  <g filter="url(#shadow)">
    <rect x="190" y="28" width="1360" height="86" rx="16" fill="#172235" stroke="#3A4B63" stroke-width="1.4"/>
    <text x="220" y="62" class="role">用户工作台</text>
    <text x="220" y="87" class="tech">React Web · 浏览器唯一入口</text>

    <line x1="480" y1="48" x2="480" y2="94" stroke="#334155" stroke-width="1"/>
    <circle cx="520" cy="60" r="3" fill="#38BDF8"/>
    <text x="536" y="64" class="card-title">知识与文档</text>
    <text x="536" y="87" class="small">知识库、上传与处理状态</text>

    <circle cx="750" cy="60" r="3" fill="#38BDF8"/>
    <text x="766" y="64" class="card-title">智能问答</text>
    <text x="766" y="87" class="small">提问、步骤流与模型选择</text>

    <circle cx="980" cy="60" r="3" fill="#38BDF8"/>
    <text x="996" y="64" class="card-title">运行管理</text>
    <text x="996" y="87" class="small">取消、恢复与事件补拉</text>

    <circle cx="1210" cy="60" r="3" fill="#38BDF8"/>
    <text x="1226" y="64" class="card-title">回答与引用</text>
    <text x="1226" y="87" class="small">答案、来源与原文核查</text>
  </g>

  <path class="blue-link bidirectional-blue" d="M510 120V144"/>
  <text x="528" y="136" class="label">API / SSE</text>

  <!-- Service layer -->
  <rect x="48" y="148" width="4" height="270" rx="2" fill="#38BDF8"/>
  <text x="70" y="176" class="layer">服务层</text>

  <g filter="url(#shadow)">
    <rect x="190" y="148" width="640" height="270" rx="18" fill="#10261F" stroke="#2FA37D" stroke-width="1.6"/>
    <text x="220" y="187" class="role">业务与安全网关</text>
    <text x="220" y="211" class="tech">Go-zero · 统一业务入口与权限边界</text>

    <rect x="220" y="245" width="184" height="92" rx="12" fill="#174438"/>
    <text x="240" y="275" class="card-title">接入与权限</text>
    <text x="240" y="300" class="body">认证 · 租户隔离</text>
    <text x="240" y="321" class="small">知识范围由服务端注入</text>

    <rect x="418" y="245" width="184" height="92" rx="12" fill="#174438"/>
    <text x="438" y="275" class="card-title">Run Controller</text>
    <text x="438" y="300" class="body">SSE · 事件补拉</text>
    <text x="438" y="321" class="small">超时 · 取消 · 并发控制</text>

    <rect x="616" y="245" width="184" height="92" rx="12" fill="#174438"/>
    <text x="636" y="275" class="card-title">Tool Gateway</text>
    <text x="636" y="300" class="body">检索 · 文档 · 任务</text>
    <text x="636" y="321" class="small">证据与工具调用审计</text>

    <rect x="220" y="361" width="580" height="34" rx="9" fill="#1C3A34"/>
    <text x="510" y="383" class="label" text-anchor="middle">内部服务令牌 · 分布式限流 · 运行审计</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="910" y="148" width="640" height="270" rx="18" fill="#102235" stroke="#2C93C4" stroke-width="1.6"/>
    <text x="940" y="187" class="role">Agent 编排</text>
    <text x="940" y="211" class="tech">FastAPI / LangGraph · 受控决策与可信生成</text>

    <rect x="940" y="245" width="136" height="92" rx="12" fill="#173F58"/>
    <text x="1008" y="275" class="card-title" text-anchor="middle">路由规划</text>
    <text x="1008" y="300" class="body" text-anchor="middle">选择处理链路</text>
    <text x="1008" y="321" class="small" text-anchor="middle">按权限生成计划</text>

    <rect x="1088" y="245" width="136" height="92" rx="12" fill="#173F58"/>
    <text x="1156" y="275" class="card-title" text-anchor="middle">证据决策</text>
    <text x="1156" y="300" class="body" text-anchor="middle">评估与查询改写</text>
    <text x="1156" y="321" class="small" text-anchor="middle">不足时明确拒答</text>

    <rect x="1236" y="245" width="136" height="92" rx="12" fill="#27345F"/>
    <text x="1304" y="275" class="card-title" text-anchor="middle">答案生成</text>
    <text x="1304" y="300" class="body" text-anchor="middle">仅使用可信证据</text>
    <text x="1304" y="321" class="small" text-anchor="middle">结构化回答与引用</text>

    <rect x="1384" y="245" width="136" height="92" rx="12" fill="#214A43"/>
    <text x="1452" y="275" class="card-title" text-anchor="middle">引用校验</text>
    <text x="1452" y="300" class="body" text-anchor="middle">结论与来源一致</text>
    <text x="1452" y="321" class="small" text-anchor="middle">失败则修正或拒答</text>

    <path class="blue-link micro" d="M1079 291H1085"/>
    <path class="purple-link micro" d="M1227 291H1233"/>
    <path class="purple-link micro" d="M1375 291H1381"/>

    <rect x="940" y="361" width="580" height="34" rx="9" fill="#1A3047"/>
    <text x="1230" y="383" class="label" text-anchor="middle">有界循环 · PostgreSQL Checkpoint · Provider 抽象</text>
  </g>

  <text x="870" y="275" class="label" text-anchor="middle">内部工具协议</text>
  <path class="blue-link bidirectional-blue" d="M836 292H904"/>
  <text x="870" y="314" class="small" text-anchor="middle">授权范围 / 证据</text>

  <!-- Knowledge and data layer -->
  <rect x="48" y="458" width="4" height="170" rx="2" fill="#34D399"/>
  <text x="70" y="486" class="layer">知识与数据层</text>

  <g filter="url(#shadow)">
    <rect x="190" y="458" width="1360" height="170" rx="18" fill="#111F25" stroke="#2A6B56" stroke-width="1.4"/>

    <rect x="210" y="488" width="315" height="110" rx="13" fill="#174438"/>
    <text x="232" y="520" class="card-title">异步索引</text>
    <text x="232" y="546" class="body">Outbox · JetStream · Worker</text>
    <text x="232" y="572" class="small">并发消费 · 幂等 Upsert · DLQ</text>

    <rect x="545" y="488" width="315" height="110" rx="13" fill="#253249"/>
    <text x="567" y="520" class="card-title">数据与知识存储</text>
    <text x="567" y="546" class="body">PostgreSQL · Redis · MinIO</text>
    <text x="567" y="572" class="small">Milvus / Etcd · 版本化向量索引</text>

    <rect x="880" y="488" width="315" height="110" rx="13" fill="#173F58"/>
    <text x="902" y="520" class="card-title">在线检索</text>
    <text x="902" y="546" class="body">混合召回 · 重排 · 上下文扩展</text>
    <text x="902" y="572" class="small">租户过滤 · 证据 ID · 低延迟</text>

    <rect x="1215" y="488" width="315" height="110" rx="13" fill="#382D5B"/>
    <text x="1237" y="520" class="card-title">模型服务</text>
    <text x="1237" y="546" class="body">Chat · Embedding · 可选联网</text>
    <text x="1237" y="572" class="small">Provider 隔离 · 模型可替换</text>

    <path class="green-link micro" d="M529 543H541"/>
    <path class="blue-link micro" d="M864 543H876"/>
    <path class="purple-link bidirectional-purple micro" d="M1199 543H1211"/>
  </g>

  <path class="green-link" d="M345 418V484"/>
  <text x="360" y="448" class="small">文档任务</text>

  <path class="blue-link" d="M690 418V440H1038V484"/>
  <text x="845" y="434" class="small" text-anchor="middle">在线检索</text>

  <path class="purple-link" d="M1380 418V484"/>
  <text x="1395" y="448" class="small">模型调用</text>

  <!-- Performance and engineering layer -->
  <rect x="48" y="668" width="4" height="132" rx="2" fill="#A78BFA"/>
  <text x="70" y="696" class="layer">性能与工程保障</text>

  <g filter="url(#shadow)">
    <rect x="190" y="668" width="1360" height="132" rx="18" fill="#171A2B" stroke="#554584" stroke-width="1.4"/>

    <rect x="210" y="688" width="315" height="92" rx="13" fill="#24284A"/>
    <text x="232" y="717" class="card-title">低时延路径</text>
    <text x="232" y="742" class="body">SSE 流式 · 在线/离线解耦</text>
    <text x="232" y="765" class="small">混合检索 · 首包可见</text>

    <rect x="545" y="688" width="315" height="92" rx="13" fill="#24284A"/>
    <text x="567" y="717" class="card-title">容量与背压</text>
    <text x="567" y="742" class="body">Redis 限流 · 并发预算</text>
    <text x="567" y="765" class="small">Deadline · 取消传播</text>

    <rect x="880" y="688" width="315" height="92" rx="13" fill="#24284A"/>
    <text x="902" y="717" class="card-title">可靠性</text>
    <text x="902" y="742" class="body">Outbox · ACK · 租约重试</text>
    <text x="902" y="765" class="small">Checkpoint · 状态恢复</text>

    <rect x="1215" y="688" width="315" height="92" rx="13" fill="#24284A"/>
    <text x="1237" y="717" class="card-title">观测与质量</text>
    <text x="1237" y="742" class="body">OTel · Prometheus · Grafana / Jaeger</text>
    <text x="1237" y="765" class="small">E2E · Recall@K · 延迟评估</text>
  </g>
</svg>

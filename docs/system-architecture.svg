<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise-RAG 系统架构</title>
  <desc id="desc">React 前端通过 Go-zero 应用内核访问 Agent 问答与异步文档处理链路，系统使用 PostgreSQL、Milvus、MinIO、NATS 和外部模型服务，并通过 OpenTelemetry、Prometheus、Grafana 与 Jaeger 提供可观测能力。</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="136%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#020617" flood-opacity="0.3"/>
    </filter>
    <style>
      .layer { font: 700 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; fill: #8291A8; letter-spacing: 1px; }
      .title { font: 700 18px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; fill: #F8FAFC; }
      .name { font: 650 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; fill: #F1F5F9; }
      .body { font: 500 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; fill: #AEBBD0; }
      .small { font: 600 10px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; fill: #C9D5E7; }
      .dependency { fill: none; stroke: #40506A; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .ingest { fill: none; stroke: #34D399; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .agent { fill: none; stroke: #38BDF8; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .observe { fill: none; stroke: #A78BFA; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1200" height="820" rx="20" fill="#0B1120"/>

  <text x="48" y="34" class="layer">访问层</text>
  <g filter="url(#shadow)">
    <rect x="48" y="48" width="1104" height="72" rx="10" fill="#172033" stroke="#2C3950"/>
    <text x="76" y="79" class="title">React Web</text>
    <text x="76" y="101" class="body">助手 · 知识库 · 文档 · 日志 · 设置</text>
    <rect x="847" y="66" width="277" height="38" rx="7" fill="#243048"/>
    <text x="867" y="82" class="name">交互通道</text>
    <text x="867" y="98" class="body">POST API · SSE · 引用定位</text>
  </g>

  <path class="dependency" d="M600 120V151"/>
  <text x="48" y="145" class="layer">应用内核</text>
  <g filter="url(#shadow)">
    <rect x="48" y="159" width="1104" height="108" rx="10" fill="#151E2D" stroke="#314057"/>
    <rect x="72" y="181" width="230" height="64" rx="8" fill="#263249"/>
    <text x="92" y="207" class="title">Go-zero API</text>
    <text x="92" y="229" class="body">鉴权 · 参数校验 · 流式响应</text>

    <path class="dependency" d="M302 213H336"/>
    <rect x="336" y="181" width="356" height="64" rx="8" fill="#1D3650"/>
    <text x="356" y="207" class="title">领域编排</text>
    <text x="356" y="229" class="body">知识管理 · 会话 · 检索 · 文档生命周期</text>

    <path class="dependency" d="M692 213H726"/>
    <rect x="726" y="181" width="402" height="64" rx="8" fill="#2B2549"/>
    <text x="746" y="207" class="title">运行治理</text>
    <text x="746" y="229" class="body">状态机 · 超时重试 · 指标 · Trace · 成本</text>
  </g>

  <path class="ingest" d="M354 267V307"/>
  <path class="agent" d="M846 267V307"/>
  <text x="48" y="301" class="layer">业务执行层</text>

  <g filter="url(#shadow)">
    <rect x="48" y="315" width="522" height="268" rx="10" fill="#111D22" stroke="#26715C"/>
    <text x="74" y="347" class="title">异步文档处理</text>
    <text x="74" y="368" class="body">状态受控的入库、索引与删除流水线</text>

    <rect x="74" y="397" width="128" height="58" rx="8" fill="#173D34"/>
    <text x="92" y="422" class="name">上传登记</text>
    <text x="92" y="441" class="body">文件与任务</text>
    <path class="ingest" d="M202 426H225"/>
    <rect x="225" y="397" width="128" height="58" rx="8" fill="#173D34"/>
    <text x="243" y="422" class="name">NATS 调度</text>
    <text x="243" y="441" class="body">队列与重试</text>
    <path class="ingest" d="M353 426H376"/>
    <rect x="376" y="397" width="166" height="58" rx="8" fill="#173D34"/>
    <text x="394" y="422" class="name">Worker 执行</text>
    <text x="394" y="441" class="body">并发消费 · 幂等状态</text>

    <path class="ingest" d="M459 455V478H138V495"/>
    <rect x="74" y="495" width="128" height="58" rx="8" fill="#204B40"/>
    <text x="92" y="520" class="name">结构化解析</text>
    <text x="92" y="539" class="body">正文 · 标题 · 表格</text>
    <path class="ingest" d="M202 524H225"/>
    <rect x="225" y="495" width="128" height="58" rx="8" fill="#204B40"/>
    <text x="243" y="520" class="name">内容切块</text>
    <text x="243" y="539" class="body">上下文 · 元数据</text>
    <path class="ingest" d="M353 524H376"/>
    <rect x="376" y="495" width="166" height="58" rx="8" fill="#204B40"/>
    <text x="394" y="520" class="name">向量化索引</text>
    <text x="394" y="539" class="body">Embedding · Milvus</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="598" y="315" width="554" height="268" rx="10" fill="#101B29" stroke="#26759C"/>
    <text x="624" y="347" class="title">Agent Runtime</text>
    <text x="624" y="368" class="body">在迭代、工具和时间预算内自主获取证据</text>

    <rect x="624" y="397" width="112" height="58" rx="8" fill="#173A55"/>
    <text x="642" y="422" class="name">规划</text>
    <text x="642" y="441" class="body">目标与工具</text>
    <path class="agent" d="M736 426H752"/>
    <rect x="752" y="397" width="112" height="58" rx="8" fill="#173A55"/>
    <text x="770" y="422" class="name">执行</text>
    <text x="770" y="441" class="body">并行与超时</text>
    <path class="agent" d="M864 426H880"/>
    <rect x="880" y="397" width="112" height="58" rx="8" fill="#173A55"/>
    <text x="898" y="422" class="name">观察</text>
    <text x="898" y="441" class="body">结果与来源</text>
    <path class="agent" d="M992 426H1008"/>
    <rect x="1008" y="397" width="118" height="58" rx="8" fill="#21465F"/>
    <text x="1026" y="422" class="name">合成</text>
    <text x="1026" y="441" class="body">回答与引用</text>

    <path class="agent" d="M936 397V383H680V397"/>

    <text x="624" y="492" class="layer">工具注册表</text>
    <rect x="624" y="506" width="116" height="46" rx="7" fill="#203B55"/>
    <text x="642" y="526" class="name">知识检索</text>
    <text x="642" y="542" class="small">混合召回 · 重排</text>
    <rect x="752" y="506" width="116" height="46" rx="7" fill="#203B55"/>
    <text x="770" y="526" class="name">知识概览</text>
    <text x="770" y="542" class="small">主题与范围</text>
    <rect x="880" y="506" width="116" height="46" rx="7" fill="#203B55"/>
    <text x="898" y="526" class="name">文档定位</text>
    <text x="898" y="542" class="small">文档与章节</text>
    <rect x="1008" y="506" width="118" height="46" rx="7" fill="#3A2B5C"/>
    <text x="1026" y="526" class="name">联网搜索</text>
    <text x="1026" y="542" class="small">外部网页来源</text>
  </g>

  <path class="dependency" d="M309 583V617H875"/>
  <path class="dependency" d="M875 583V617"/>
  <text x="48" y="616" class="layer">数据与服务层</text>
  <g filter="url(#shadow)">
    <rect x="48" y="630" width="1104" height="92" rx="10" fill="#151D2D" stroke="#2C3950"/>
    <rect x="70" y="649" width="174" height="54" rx="8" fill="#253148"/>
    <text x="88" y="673" class="name">PostgreSQL</text><text x="88" y="691" class="body">业务 · 状态 · 会话</text>
    <rect x="262" y="649" width="154" height="54" rx="8" fill="#253148"/>
    <text x="280" y="673" class="name">Milvus</text><text x="280" y="691" class="body">向量索引 · 检索</text>
    <rect x="434" y="649" width="142" height="54" rx="8" fill="#253148"/>
    <text x="452" y="673" class="name">MinIO</text><text x="452" y="691" class="body">原始文档</text>
    <rect x="594" y="649" width="180" height="54" rx="8" fill="#204238"/>
    <text x="612" y="673" class="name">NATS</text><text x="612" y="691" class="body">任务流转 · Trace</text>
    <rect x="792" y="649" width="338" height="54" rx="8" fill="#382A59"/>
    <text x="810" y="673" class="name">OpenRouter / Model Provider</text>
    <text x="810" y="691" class="body">对话 · Embedding · 联网搜索</text>
  </g>

  <text x="48" y="753" class="layer">可观测平面</text>
  <g filter="url(#shadow)">
    <rect x="48" y="766" width="1104" height="38" rx="8" fill="#211B38" stroke="#554584"/>
    <text x="72" y="790" class="name">OpenTelemetry</text>
    <path class="observe" d="M205 785H246"/>
    <text x="266" y="790" class="name">Jaeger</text>
    <text x="325" y="790" class="body">同步与 NATS 异步链路</text>
    <text x="570" y="790" class="name">Prometheus</text>
    <text x="672" y="790" class="body">指标与告警</text>
    <path class="observe" d="M768 785H809"/>
    <text x="829" y="790" class="name">Grafana</text>
    <text x="894" y="790" class="body">性能与模型成本</text>
  </g>
</svg>

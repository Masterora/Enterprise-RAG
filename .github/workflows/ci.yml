name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./...

  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run ruff check src tests
      - run: uv run mypy src
      - run: uv run pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v6
        with:
          node-version-file: web/.nvmrc
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
        env:
          AGENT_SERVICE_TOKEN: 0123456789abcdef
          OPENROUTER_API_KEY: verification-key
          RAG_AUTH_SECRET: verification-auth-secret-0123456789
          REDIS_PASSWORD: verification-redis-password
          POSTGRES_DSN: postgresql://rag:rag@postgres:5432/rag?sslmode=disable

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Run isolated end-to-end knowledge Q&A
        run: ./tests/e2e/run.sh

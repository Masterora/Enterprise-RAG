service:
  host: 0.0.0.0
  port: 8000
  service_token: ${AGENT_SERVICE_TOKEN}
  request_timeout_seconds: 90

backend:
  base_url: http://localhost:9999
  timeout_seconds: 30

agent:
  max_rewrite_attempts: 1
  max_question_characters: 4000
  max_context_characters: 18000
  max_citations: 5
  max_concurrent_runs: 32
  retain_completed_checkpoints: false

model:
  provider: openrouter
  default_model: openai/gpt-5.6-sol
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 45
  max_retries: 2
  max_output_tokens: 2000

checkpoint:
  postgres_dsn: postgres://rag:rag@localhost:55432/rag?sslmode=disable
  schema_name: langgraph
  setup_on_start: true

telemetry:
  service_name: enterprise-rag-agent
  otlp_endpoint: http://localhost:4317
  metrics_enabled: true
